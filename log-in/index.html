<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Authentication</title>
    <style>
        :root {
            --primary: #3a7bd5;
            --primary-hover: #2c5aa6;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #dce1e7;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            --input-focus: rgba(58, 123, 213, 0.15);
            --radius: 16px;
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e9f0f8 0%, #d0ddeb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: var(--text);
        }

        /* Subtle animated background shapes */
        body::before {
            content: '';
            position: fixed;
            top: -15%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(58, 123, 213, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: float 18s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -12%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(39, 174, 96, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: float 22s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-30px, 25px) scale(1.05);
            }
            66% {
                transform: translate(20px, -20px) scale(0.95);
            }
        }

        .login-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 32px;
            width: 420px;
            max-width: 100%;
            box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            backdrop-filter: blur(10px);
            transition: transform var(--transition);
            position: relative;
            z-index: 2;
        }

        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 28px 55px rgba(0, 0, 0, 0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #5a9adf);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(58, 123, 213, 0.25);
        }

        .icon svg {
            width: 30px;
            height: 30px;
            fill: white;
        }

        .login-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-top: 6px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #4a5568;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            pointer-events: none;
            transition: color var(--transition);
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            background: #f9fbfd;
            transition: all var(--transition);
            font-family: inherit;
            color: var(--text);
            letter-spacing: 0.3px;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--input-focus);
        }

        .input-wrapper input:focus+.input-icon {
            color: var(--primary);
        }

        /* Error state */
        .input-group.error input {
            border-color: var(--danger);
            background: #fff5f5;
        }
        .input-group.error .input-icon {
            color: var(--danger);
        }
        .input-group.error .error-message {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }

        .error-message {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-box {
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition);
            animation: fadeIn 0.3s ease;
        }

        .message-box.success {
            background: #e6f7ed;
            color: #1e7a42;
            border-left: 4px solid var(--success);
        }

        .message-box.error {
            background: #ffeaea;
            color: #b71c1c;
            border-left: 4px solid var(--danger);
        }

        .message-box.hidden {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary), #1e4d8c);
            color: white;
            box-shadow: 0 6px 16px rgba(58, 123, 213, 0.3);
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #2c5aa6, #153b6e);
            box-shadow: 0 10px 22px rgba(58, 123, 213, 0.4);
            transform: translateY(-2px);
        }
        .btn-login:active {
            transform: translateY(0) scale(0.97);
        }

        .btn-reset {
            background: #ffffff;
            color: #4a5568;
            border: 2px solid #dce1e7;
        }
        .btn-reset:hover {
            background: #f4f6fa;
            border-color: #b0b9c6;
            transform: translateY(-2px);
        }
        .btn-reset:active {
            transform: translateY(0) scale(0.97);
        }

        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-login.loading .spinner {
            display: block;
        }
        .btn-login.loading .btn-text {
            display: none;
        }

        .demo-credentials {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-light);
            background: #f8fafc;
            padding: 10px;
            border-radius: 10px;
            border: 1px dashed #cbd5e0;
        }

        .demo-credentials strong {
            color: var(--text);
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 28px 20px;
                border-radius: 20px;
            }
            .login-header h2 {
                font-size: 1.6rem;
            }
            .button-group {
                flex-direction: column;
            }
            .input-wrapper input {
                padding: 12px 12px 12px 42px;
            }
        }

        @media (max-width: 350px) {
            .login-container {
                padding: 20px 15px;
            }
            .login-header .icon {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon">
                <!-- User lock icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    <circle cx="12" cy="16" r="1"></circle>
                </svg>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to your account</p>
        </div>

        <!-- Message area (dynamic) -->
        <div id="messageBox" class="message-box hidden"></div>

        <form id="loginForm" novalidate>
            <!-- Username -->
            <div class="input-group" id="usernameGroup">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4"></circle>
                        <path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"></path>
                    </svg>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
                </div>
                <div class="error-message" id="usernameError"></div>
            </div>

            <!-- Password -->
            <div class="input-group" id="passwordGroup">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="off">
                </div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">🔐 Login</span>
                    <span class="spinner"></span>
                </button>
                <button type="reset" class="btn-reset" id="resetBtn">
                    <span>↺ Reset</span>
                </button>
            </div>
        </form>

        <!-- Demo hints -->
        <div class="demo-credentials">
            <p>🔑 Demo: <strong>user</strong> / <strong>pass123</strong></p>
            <p style="font-size:0.8rem; margin-top:4px;">Or try your own credentials (validation only)</p>
        </div>
    </div>

    <script>
        (function() {
            // DOM Elements
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const usernameGroup = document.getElementById('usernameGroup');
            const passwordGroup = document.getElementById('passwordGroup');
            const usernameError = document.getElementById('usernameError');
            const passwordError = document.getElementById('passwordError');
            const messageBox = document.getElementById('messageBox');
            const loginBtn = document.getElementById('loginBtn');
            const resetBtn = document.getElementById('resetBtn');

            // Demo credentials
            const VALID_USERNAME = 'user';
            const VALID_PASSWORD = 'pass123';

            // Helper to show/hide field error
            function showFieldError(group, errorElement, message) {
                group.classList.add('error');
                errorElement.textContent = '⚠️ ' + message;
                errorElement.style.display = 'flex';
            }

            function clearFieldError(group, errorElement) {
                group.classList.remove('error');
                errorElement.textContent = '';
                errorElement.style.display = 'none';
            }

            // Clear all field errors
            function clearAllFieldErrors() {
                clearFieldError(usernameGroup, usernameError);
                clearFieldError(passwordGroup, passwordError);
            }

            // Show global message (success/error)
            function showMessage(type, text) {
                messageBox.className = `message-box ${type}`; // 'success' or 'error'
                messageBox.innerHTML = text;
                messageBox.classList.remove('hidden');
            }

            function hideMessage() {
                messageBox.classList.add('hidden');
                messageBox.innerHTML = '';
            }

            // Validation functions
            function validateUsername() {
                const val = usernameInput.value.trim();
                if (val === '') {
                    showFieldError(usernameGroup, usernameError, 'Username cannot be empty.');
                    return false;
                }
                if (val.length < 3) {
                    showFieldError(usernameGroup, usernameError, 'Username must be at least 3 characters.');
                    return false;
                }
                if (!/^[a-zA-Z0-9_]+$/.test(val)) {
                    showFieldError(usernameGroup, usernameError, 'Only letters, numbers, and underscore allowed.');
                    return false;
                }
                clearFieldError(usernameGroup, usernameError);
                return true;
            }

            function validatePassword() {
                const val = passwordInput.value;
                if (val === '') {
                    showFieldError(passwordGroup, passwordError, 'Password cannot be empty.');
                    return false;
                }
                if (val.length < 6) {
                    showFieldError(passwordGroup, passwordError, 'Password must be at least 6 characters.');
                    return false;
                }
                clearFieldError(passwordGroup, passwordError);
                return true;
            }

            function validateForm() {
                const isUserValid = validateUsername();
                const isPassValid = validatePassword();
                return isUserValid && isPassValid;
            }

            // Simulate authentication
            function authenticate(username, password) {
                // In real app, this would be an API call
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                            resolve({ success: true, message: '✅ Login successful! Redirecting to dashboard...' });
                        } else {
                            reject({ success: false, message: '❌ Invalid username or password. Please try again.' });
                        }
                    }, 1200); // Simulate network delay
                });
            }

            // Handle form submission
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideMessage();
                clearAllFieldErrors();

                // Validate inputs
                if (!validateForm()) {
                    // Focus first invalid field
                    if (usernameGroup.classList.contains('error')) {
                        usernameInput.focus();
                    } else if (passwordGroup.classList.contains('error')) {
                        passwordInput.focus();
                    }
                    return;
                }

                // Show loading state
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                try {
                    const result = await authenticate(username, password);
                    // Success
                    showMessage('success', result.message);
                    // Optionally clear fields after success? Usually redirect.
                    // For demo, we'll just show success and then reset after a few seconds.
                    setTimeout(() => {
                        // Simulate redirect - reset form
                        loginForm.reset();
                        hideMessage();
                        clearAllFieldErrors();
                        loginBtn.classList.remove('loading');
                        loginBtn.disabled = false;
                    }, 2500);
                } catch (error) {
                    // Authentication failed
                    showMessage('error', error.message);
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    // Shake animation for the card? Not needed.
                }
            });

            // Real-time validation on input (removes error when user types)
            usernameInput.addEventListener('input', function() {
                if (usernameGroup.classList.contains('error')) {
                    validateUsername();
                }
                // Hide global message when user edits
                if (!messageBox.classList.contains('hidden')) {
                    hideMessage();
                }
            });

            passwordInput.addEventListener('input', function() {
                if (passwordGroup.classList.contains('error')) {
                    validatePassword();
                }
                if (!messageBox.classList.contains('hidden')) {
                    hideMessage();
                }
            });

            // Reset button
            resetBtn.addEventListener('click', function(e) {
                // The reset event naturally clears inputs, but we need to clear errors/messages
                // We'll use a slight delay to ensure form.reset() fires first
                setTimeout(() => {
                    clearAllFieldErrors();
                    hideMessage();
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }, 10);
            });

            // Also handle the form's native reset event (in case reset button triggers it)
            loginForm.addEventListener('reset', function() {
                setTimeout(() => {
                    clearAllFieldErrors();
                    hideMessage();
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }, 10);
            });

            // Initial cleanup
            clearAllFieldErrors();
            hideMessage();
        })();
    </script>
</body>
</html>
